<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" fill="none">
  <defs>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff66" />
      <stop offset="100%" stop-color="#00e84d" />
    </linearGradient>
  </defs>
  <!-- Outer circle target -->
  <circle cx="50" cy="50" r="40" stroke="rgba(0, 232, 77, 0.2)" stroke-width="3" stroke-dasharray="6 8" />
  
  <!-- Glowing target prompt -->
  <g filter="url(#neon)">
    <!-- Terminal Prompt symbol > -->
    <path d="M 30 35 L 50 50 L 30 65" stroke="url(#green-grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Cursor block D-bracket -->
    <path d="M 60 32 H 70 C 78 32 78 68 70 68 H 60" stroke="url(#green-grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    
    <!-- Cyberpunk Crosshair ticks -->
    <line x1="50" y1="2" x2="50" y2="10" stroke="#00ff66" stroke-width="3" stroke-linecap="round" />
    <line x1="50" y1="90" x2="50" y2="98" stroke="#00ff66" stroke-width="3" stroke-linecap="round" />
    <line x1="2" y1="50" x2="10" y2="50" stroke="#00ff66" stroke-width="3" stroke-linecap="round" />
    <line x1="90" y1="50" x2="98" y2="50" stroke="#00ff66" stroke-width="3" stroke-linecap="round" />
  </g>
</svg>